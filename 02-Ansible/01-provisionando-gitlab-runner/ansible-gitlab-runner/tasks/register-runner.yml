---
# O token de autenticacao do runner (glrt-...) NAO fica hardcoded neste arquivo.
# O aluno o guarda uma vez no AWS SSM Parameter Store como SecureString e o
# Ansible o le aqui em tempo de execucao, pelo lookup amazon.aws.ssm_parameter.
# O lookup roda no CONTROLLER (Codespaces), usando as credenciais AWS do ambiente
# — as mesmas que o resto do lab usa. Nenhum segredo entra no git.
- name: Ler o token do runner do SSM Parameter Store
  ansible.builtin.set_fact:
    gitlab_runner_token: "{{ lookup('amazon.aws.ssm_parameter', gitlab_runner_token_ssm_path, region=gitlab_runner_ssm_region, on_missing='skip') | default('', true) }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Abortar se o token nao foi encontrado no SSM
  ansible.builtin.fail:
    msg: >-
      Token do runner nao encontrado em '{{ gitlab_runner_token_ssm_path }}' (SSM
      Parameter Store, regiao {{ gitlab_runner_ssm_region }}). Guarde o token glrt-
      do GitLab com: aws ssm put-parameter --name '{{ gitlab_runner_token_ssm_path }}'
      --type SecureString --value 'glrt-SEU-TOKEN' --region {{ gitlab_runner_ssm_region }} --overwrite
  when: gitlab_runner_token | default('') | length == 0

- name: Clear Config File
  block:
    - name: configfile Toml
      stat:
        path: "{{ gitlab_runner_config_file }}"
      register: configfile
    - name: remove config.toml file
      file:
        path: "{{ gitlab_runner_config_file }}"
        state: absent
      become: "{{ gitlab_runner_system_mode }}"
      when: configfile.stat.exists

    - name: Create .gitlab-runner dir
      file:
        path: "{{ gitlab_runner_config_file_location }}"
        state: directory
        mode: '0755'
      become: "{{ gitlab_runner_system_mode }}"

    - name: Ensure config.toml exists
      file:
        path: "{{ gitlab_runner_config_file }}"
        state: touch
        modification_time: preserve
        access_time: preserve
      become: "{{ gitlab_runner_system_mode }}"

# As tags (shell,terraform), o nivel de acesso e o "run untagged" sao definidos na
# CRIACAO do runner pela UI do GitLab (token glrt-, fluxo do GitLab 16+). Com token
# de autenticacao, o 'register' ignora --tag-list/--locked/--access-level/
# --run-untagged: esses parametros so valem na UI/API. Por isso o registro abaixo so
# vincula esta maquina ao runner ja criado, preservando as tags definidas na UI.
- name: Registrar o runner no GitLab (vincula esta maquina ao runner criado na UI)
  command: >
    {{ gitlab_runner_executable }} register
    --non-interactive
    --url 'https://gitlab.com/'
    --token '{{ gitlab_runner_token }}'
    --description '{{ gitlab_runner_name }}'
    --executor 'shell'
  become: "{{ gitlab_runner_system_mode }}"
  no_log: true
