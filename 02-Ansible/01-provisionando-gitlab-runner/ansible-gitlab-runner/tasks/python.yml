---
# Usamos o Python 3 NATIVO do Ubuntu 22.04 (3.10), nao mais o python3.8 do PPA
# deadsnakes. O virtualenv moderno deixou de suportar 3.8 ("oldest supported target
# is Python 3.9"), entao a versao antiga quebrava. O venv e criado com o proprio
# 'python3 -m venv', sem depender do pacote 'virtualenv'.
#
# O venv fica em /opt/venv (local neutro), NAO em /home/ubuntu/venv: o pipeline do
# modulo 03 roda como usuario 'gitlab-runner', que nao tem acesso ao home do
# 'ubuntu' (permissao 700). Em /opt/venv qualquer usuario do runner consegue ativar
# o Checkov.
- name: Copiar requirements.txt do venv
  copy:
    src: requirements.txt
    dest: /opt/venv-requirements.txt

- name: Criar o virtualenv (Python nativo) e instalar as dependencias
  pip:
    requirements: /opt/venv-requirements.txt
    virtualenv: /opt/venv
    virtualenv_command: /usr/bin/python3 -m venv

- name: Garantir que o venv e acessivel a todos os usuarios do runner (inclusive gitlab-runner)
  file:
    path: /opt/venv
    mode: '0755'
    recurse: true
